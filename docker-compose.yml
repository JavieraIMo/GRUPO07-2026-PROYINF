# version: '3.8'
services:
  # Backend API
  backend:
    build: ./backend
    ports:
      - "3100:3100"
    environment:
      - DB_HOST=postgres_db
      - DB_PORT=5432
      - DB_USER=user
      - DB_PASSWORD=password
      - DB_NAME=mydb
    depends_on:
      - postgres_db
      - ocr_service
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./uploads:/app/uploads # Misma carpeta compartida
    networks:
      - alara-network # Asegurarse de que estén en la misma red

  # Frontend React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - REACT_APP_API_URL=http://localhost:3100
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
      - FAST_REFRESH=true
      - WDS_SOCKET_HOST=localhost
      - WDS_SOCKET_PORT=3000
      - WDS_SOCKET_PATH=/ws
    networks:
      - alara-network # Asegurarse de que estén en la misma red

  ocr_service:
    build: ./ocr_service
    container_name: alara_ocr
    ports:
      - "5000:5000"
    volumes:
      - ./uploads:/app/uploads # Misma carpeta compartida
    networks:
      - alara-network # Asegurarse de que estén en la misma red

  tester:
    image: python:3.11-slim
    volumes:
      - ./tests:/app
    working_dir: /app
    depends_on:
      - backend
    command: >
      sh -c "apt-get update && apt-get install -y wget && pip install -r requirements.txt && wget -q https://raw.githubusercontent.com/vishnubob/wait-for-it/master/wait-for-it.sh && chmod +x wait-for-it.sh && ./wait-for-it.sh backend:3100 -- python -m unittest discover"
    networks:
      - alara-network # Asegurarse de que estén en la misma red

  postgres_db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=mydb
    volumes:
      - ./backend/sql:/app/sql
      - ./backend/initdb:/docker-entrypoint-initdb.d
    ports:
      - "5433:5432"
    networks:
      - alara-network # Asegurarse de que estén en la misma red

  # pgAdmin - Interfaz gráfica para PostgreSQL
  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@alara.cl
      - PGADMIN_DEFAULT_PASSWORD=admin123
      - PGADMIN_CONFIG_SERVER_MODE=False
      - PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED=False
    ports:
       - "5051:80"
    depends_on:
      - postgres_db
    volumes:
      - ./backend/initdb:/docker-entrypoint-initdb.d
    networks:
      - alara-network

volumes:
  postgres_data:
  pgadmin_data:

networks:
  alara-network:
    driver: bridge